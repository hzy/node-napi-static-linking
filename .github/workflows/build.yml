name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3 binutils

      - name: Build
        run: ./build.sh

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: node-linux-x64
          path: build/node
